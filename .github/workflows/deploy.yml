name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mredgh/m-red-website

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          echo "Validating docker-compose.yml..."
          ERRORS=0
          if ! grep -q 'traefik.enable=true' docker-compose.yml; then
            echo "::error::Missing traefik.enable=true label"
            ERRORS=$((ERRORS + 1))
          fi
          if ! grep -q 'certresolver=letsencrypt' docker-compose.yml; then
            echo "::error::Missing TLS certresolver label"
            ERRORS=$((ERRORS + 1))
          fi
          if ! grep -q 'loadbalancer.server.port' docker-compose.yml; then
            echo "::error::Missing loadbalancer.server.port label"
            ERRORS=$((ERRORS + 1))
          fi
          if ! grep -A1 'proxy:' docker-compose.yml | grep -q 'external: true'; then
            echo "::error::Proxy network must be declared external"
            ERRORS=$((ERRORS + 1))
          fi
          if grep -qE '^\s+ports:' docker-compose.yml; then
            echo "::error::Use expose instead of ports"
            ERRORS=$((ERRORS + 1))
          fi
          if [ $ERRORS -gt 0 ]; then exit 1; fi
          echo "Validation passed"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: /opt/m-red-website
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/m-red-website
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
